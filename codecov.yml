coverage:
  status:
    project:
      library:
        target: 60%
        threshold: 0%
        informational: false
        paths:
          - "src/derivatives_pricing"

    patch: off

comment:
  layout: "reach,diff,flags,tree"
  behavior: default
  require_changes: false

ignore:
  - ".*/tests/.*"
  - ".*/tutorials/.*"
  - ".*/examples/.*"
  - ".*\\.ipynb$"